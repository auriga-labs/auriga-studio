<svg width="512" height="512" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Auriga Studio ファビコン（背景なし）</title>
<desc>御者座をモチーフにした背景透過版のAuriga Studioファビコン</desc>

<!-- 星座線 -->
<g stroke="#A78BDB" stroke-width="3" stroke-linecap="round" opacity="0.8">
  <line x1="360" y1="180" x2="160" y2="300"/>
  <line x1="160" y1="300" x2="120" y2="470"/>
  <line x1="120" y1="470" x2="300" y2="560"/>
  <line x1="300" y1="560" x2="560" y2="500"/>
  <line x1="560" y1="500" x2="360" y2="180"/>
  <line x1="360" y1="180" x2="430" y2="100"/>
  <line x1="430" y1="100" x2="490" y2="125"/>
</g>

<!-- Capella (α) — メイン星、大きめ -->
<circle cx="360" cy="180" r="40" fill="#FFE566" opacity="0.16"/>
<circle cx="360" cy="180" r="24" fill="#FFE566" opacity="0.55"/>
<circle cx="360" cy="180" r="13" fill="#FFD93B"/>

<!-- β Aurigae -->
<circle cx="160" cy="300" r="28" fill="#FFB347" opacity="0.2"/>
<circle cx="160" cy="300" r="16" fill="#FFB347" opacity="0.7"/>
<circle cx="160" cy="300" r="9" fill="#FF9F2E"/>

<!-- θ Aurigae -->
<circle cx="120" cy="470" r="26" fill="#7EC8E3" opacity="0.25"/>
<circle cx="120" cy="470" r="14" fill="#7EC8E3" opacity="0.7"/>
<circle cx="120" cy="470" r="8" fill="#4FB3D9"/>

<!-- ι Aurigae -->
<circle cx="300" cy="560" r="26" fill="#B8A9F7" opacity="0.25"/>
<circle cx="300" cy="560" r="14" fill="#B8A9F7" opacity="0.7"/>
<circle cx="300" cy="560" r="8" fill="#9579F0"/>

<!-- ε Aurigae -->
<circle cx="560" cy="500" r="28" fill="#FF8FAB" opacity="0.2"/>
<circle cx="560" cy="500" r="16" fill="#FF8FAB" opacity="0.7"/>
<circle cx="560" cy="500" r="9" fill="#FF6B93"/>

<!-- 小ヤギ ζ -->
<circle cx="430" cy="100" r="18" fill="#7EC8E3" opacity="0.25"/>
<circle cx="430" cy="100" r="10" fill="#7EC8E3" opacity="0.7"/>
<circle cx="430" cy="100" r="5" fill="#4FB3D9"/>

<!-- 小ヤギ η -->
<circle cx="490" cy="125" r="18" fill="#B8A9F7" opacity="0.25"/>
<circle cx="490" cy="125" r="10" fill="#B8A9F7" opacity="0.7"/>
<circle cx="490" cy="125" r="5" fill="#9579F0"/>
</svg>
