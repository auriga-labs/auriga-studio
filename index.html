<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auriga Studio — 動画編集</title>
    <link rel="preload" href="./assets/vendor/tabler-icons-webfont/3.44.0/fonts/tabler-icons.woff2?v3.44.0" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="./assets/vendor/tabler-icons-webfont/3.44.0/fonts/tabler-icons-filled.woff2?v3.44.0" as="font" type="font/woff2" crossorigin>
    <!-- タブラー アイコン（かわいいよね！！） ex: https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css -->
    <link rel="stylesheet" href="./assets/vendor/tabler-icons-webfont/3.44.0/tabler-icons.min.css">
    <!-- フィルド（塗りつぶし）アイコン。ti-fi クラスでスコープしてアウトラインと共存させる -->
    <link rel="stylesheet" href="./assets/vendor/tabler-icons-webfont/3.44.0/tabler-icons-filled.scoped.css">
    <!-- ファビコン -->
    <link rel="icon" type="image/x-icon" href="favicon.ico?symbol">
    <link rel="stylesheet" href="style.css">
    <!-- テーマ配色（パレット）。既定は YMM4。main.js の applyTheme が href を差し替える。
         共通（モード非依存）を先に読み込み、その上にライト/ダーク差分を重ねる -->
    <link rel="stylesheet" id="themeLink" href="themes/ymm4.css">
    <link rel="stylesheet" id="themeVariantLink" href="themes/ymm4-light.css">
</head>
<body>
    <!-- ===== スプラッシュ画面 ===== -->
    <!-- 起動直後に表示し、初期化完了後（init）にフェードアウトして取り除く -->
    <div class="splash" id="splash">
        <div class="splash__inner">
            <img class="splash__mark" src="favicon-symbol.svg" alt="" width="96" height="96">
            <div class="splash__title">Auriga<b>Studio</b></div>
            <div class="splash__tagline">統合型動画編集ソフト</div>
            <div class="splash__spinner" role="status" aria-label="読み込み中">
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <!-- ===== メニューバー ===== -->
    <header class="menubar">
        <div class="menubar__left">
            <!-- スマホ幅で表示するハンバーガー。ヘッダーの各操作をパネルに集約する -->
            <button class="menu-burger" id="menuBurger" type="button" title="メニュー" aria-haspopup="true" aria-expanded="false">
                <i class="ti ti-menu-2"></i>
            </button>
            <!-- ロゴ文字のメニュー（全テーマ共通のアプリメニュー）。クリックでドロップダウンを開く -->
            <button class="logo" id="appLogoMenu" type="button" title="Auriga Studio メニュー">
                <img class="logo__mark" src="favicon-symbol.svg" alt="Auriga Studio" width="26" height="26">
                <span class="logo__text">Auriga<b>Studio</b></span>
                <i class="ti ti-chevron-down logo__caret"></i>
            </button>
            <!-- メニューバーは menu_layout の定義から動的生成する -->
            <nav class="menu" id="appMenu"></nav>
        </div>
        <div class="menubar__center">
            <div class="workspace-tabs">
                <button class="ws-tab is-active">編集</button>
                <button class="ws-tab">カラー</button>
                <button class="ws-tab">オーディオ</button>
                <button class="ws-tab">書き出し</button>
            </div>
        </div>
        <div class="menubar__right">
            <!-- テーマ切り替えはロゴメニュー内（表示 > テーマ）へ移動した -->
            <!-- アカウント。未ログインは Unknown ユーザーアイコン。クリックでアカウント情報を開く -->
            <div class="account">
                <button class="avatar" id="avatarBtn" type="button" title="アカウント" aria-haspopup="true" aria-expanded="false">
                    <i class="ti ti-user"></i>
                </button>
                <!-- アカウント情報ポップオーバー（Auriga Cloud の使用容量つき） -->
                <div class="account-pop" id="accountPop" hidden>
                    <div class="account-pop__head">
                        <div class="avatar avatar--lg" id="accountAvatarLg"><i class="ti ti-user"></i></div>
                        <div class="account-pop__id">
                            <div class="account-pop__name" id="accountName">ゲスト</div>
                            <div class="account-pop__mail" id="accountMail">未ログイン</div>
                        </div>
                    </div>
                    <button class="btn btn--block btn-google" id="btnSignIn">
                        <!-- Google "G" ロゴ -->
                        <svg width="20" height="20" viewBox="0 0 48 48">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                            <path fill="none" d="M0 0h48v48H0z"/>
                        </svg>
                        Google でログイン
                    </button>
                    <div class="cloud">
                        <div class="cloud__head">
                            <span class="cloud__title"><i class="ti ti-cloud"></i> Auriga Cloud</span>
                            <span class="cloud__usage" id="cloudUsage">— / 15 GB</span>
                        </div>
                        <div class="cloud__gauge"><span class="cloud__bar" id="cloudBar"></span></div>
                        <div class="cloud__note" id="cloudNote">ログインすると 15 GB を無料で利用できます</div>
                    </div>
                    <!-- 規約・プライバシーへの導線（OAuth 同意画面の要件にも対応） -->
                    <div class="account-pop__legal">
                        <a href="./privacy.html" target="_blank" rel="noopener">プライバシーポリシー</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- スマホ幅で、ヘッダーの操作（アプリメニュー/ワークスペース）を
         まとめてネストするパネル。中身は JS でヘッダーから移設する -->
    <nav class="mobile-panel" id="mobilePanel" hidden></nav>

    <!-- ===== メイン領域 ===== -->
    <main class="layout">
        <!-- 左：メディアブラウザ -->
        <aside class="panel panel--media">
            <div class="panel__head">
                <div class="panel__tabs">
                    <button class="ptab is-active" data-tab="media">メディア</button>
                    <button class="ptab" data-tab="effects">エフェクト</button>
                    <button class="ptab" data-tab="text">テキスト</button>
                    <button class="ptab" data-tab="cloud">クラウド</button>
                </div>
            </div>

            <div class="panel__body">
                <!-- メディアタブ -->
                <section class="ptab-content is-active" data-content="media">
                    <div class="media-toolbar">
                        <button class="btn btn--block" id="btnImport">＋ メディアを読み込む</button>
                        <input type="file" id="fileInput" accept="video/*,image/*,audio/*" multiple hidden>
                    </div>
                    <div class="media-grid" id="mediaGrid">
                        <!-- JSで生成 -->
                    </div>
                </section>

                <!-- エフェクトタブ -->
                <section class="ptab-content" data-content="effects">
                    <div class="effect-list" id="effectList"></div>
                </section>

                <!-- テキストタブ -->
                <section class="ptab-content" data-content="text">
                    <div class="text-presets" id="textPresets"></div>
                </section>

                <!-- クラウドタブ（Auriga Cloud 内のファイル一覧） -->
                <section class="ptab-content" data-content="cloud">
                    <div class="media-toolbar cloud-toolbar">
                        <button class="btn btn--block" id="btnCloudRefresh">
                            <i class="ti ti-refresh"></i> 更新
                        </button>
                    </div>
                    <div class="cloud-list" id="cloudList">
                        <!-- JSで生成 -->
                    </div>
                </section>
            </div>
        </aside>

        <!-- 中央：プレビュー -->
        <section class="stage">
            <div class="stage__head">
                <span class="stage__label">プログラムモニター</span>
                <div class="stage__res">
                    <select id="resSelect">
                        <option>1920 × 1080 (16:9)</option>
                        <option>1080 × 1920 (9:16)</option>
                        <option>1080 × 1080 (1:1)</option>
                        <option>3840 × 2160 (4K)</option>
                    </select>
                </div>
            </div>

            <div class="viewer">
                <div class="viewer__canvas" id="viewerCanvas">
                    <div class="viewer__placeholder" id="viewerPlaceholder"></div>
                    <canvas id="compositor" width="1920" height="1080"></canvas>
                    <video id="previewVideo" playsinline></video>
                    <div class="viewer__overlay" id="textOverlay"></div>
                </div>
            </div>

            <!-- トランスポート -->
            <div class="transport">
                <div class="transport__time">
                    <span id="curTime">00:00:00:00</span>
                    <span class="transport__sep">/</span>
                    <span id="durTime">00:00:10:00</span>
                </div>
                <div class="transport__controls">
                    <button class="tbtn" id="btnStart" title="先頭へ"><i class="ti ti-fi ti-player-skip-back"></i></button>
                    <button class="tbtn" id="btnPrev" title="前のフレーム"><i class="ti ti-fi ti-player-track-prev"></i></button>
                    <button class="tbtn tbtn--play" id="btnPlay" title="再生/停止 (Space)"><i class="ti ti-fi ti-player-play"></i></button>
                    <button class="tbtn" id="btnNext" title="次のフレーム"><i class="ti ti-fi ti-player-track-next"></i></button>
                    <button class="tbtn" id="btnEnd" title="末尾へ"><i class="ti ti-fi ti-player-skip-forward"></i></button>
                </div>
                <div class="transport__right">
                    <button class="tbtn" id="btnLoop" title="ループ"><i class="ti ti-repeat"></i></button>
                    <div class="volume">
                        <span class="volume__icon"><i class="ti ti-volume"></i></span>
                        <input type="range" id="volume" min="0" max="100" value="80">
                    </div>
                </div>
            </div>
        </section>

        <!-- 右：プロパティ -->
        <aside class="panel panel--props">
            <div class="panel__head">
                <div class="panel__tabs">
                    <button class="ptab is-active">プロパティ</button>
                </div>
            </div>
            <div class="panel__body" id="propsBody">
                <div class="props-empty" id="propsEmpty">
                    <p>クリップを選択すると<br>プロパティが表示されます</p>
                </div>
                <div class="props-content" id="propsContent" hidden>
                    <div class="prop-group">
                        <h4 class="prop-group__title">変形</h4>
                        <div class="prop-row">
                            <label>位置 X</label>
                            <input type="range" min="-500" max="500" value="0" data-prop="x">
                            <output>0</output>
                        </div>
                        <div class="prop-row">
                            <label>位置 Y</label>
                            <input type="range" min="-500" max="500" value="0" data-prop="y">
                            <output>0</output>
                        </div>
                        <div class="prop-row">
                            <label>スケール</label>
                            <input type="range" min="10" max="300" value="100" data-prop="scale">
                            <output>100</output>
                        </div>
                        <div class="prop-row">
                            <label>回転</label>
                            <input type="range" min="-180" max="180" value="0" data-prop="rotate">
                            <output>0</output>
                        </div>
                    </div>
                    <div class="prop-group">
                        <h4 class="prop-group__title">不透明度</h4>
                        <div class="prop-row">
                            <label>透明度</label>
                            <input type="range" min="0" max="100" value="100" data-prop="opacity">
                            <output>100</output>
                        </div>
                    </div>
                    <div class="prop-group">
                        <h4 class="prop-group__title">速度</h4>
                        <div class="prop-row">
                            <label>再生速度</label>
                            <input type="range" min="25" max="200" value="100" data-prop="speed">
                            <output>100</output>
                        </div>
                    </div>
                    <div class="prop-group">
                        <h4 class="prop-group__title">カラー補正</h4>
                        <div class="prop-row">
                            <label>明るさ</label>
                            <input type="range" min="0" max="200" value="100" data-prop="brightness">
                            <output>100</output>
                        </div>
                        <div class="prop-row">
                            <label>コントラスト</label>
                            <input type="range" min="0" max="200" value="100" data-prop="contrast">
                            <output>100</output>
                        </div>
                        <div class="prop-row">
                            <label>彩度</label>
                            <input type="range" min="0" max="200" value="100" data-prop="saturate">
                            <output>100</output>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <!-- ===== タイムライン ===== -->
    <!-- プレビューとタイムラインの境界をドラッグして高さを変更する -->
    <div class="tl-resizer" id="tlResizer" title="ドラッグでタイムラインの高さを調整" role="separator" aria-orientation="horizontal"></div>
    <section class="timeline">
        <div class="timeline__toolbar">
            <div class="tl-tools">
                <button class="tl-tool is-active" data-tool="select" title="選択ツール (V)">⤧</button>
                <button class="tl-tool" data-tool="cut" title="カットツール (C)">✂</button>
                <button class="tl-tool" data-tool="hand" title="ハンドツール (H)">✋</button>
            </div>
            <div class="tl-actions">
                <button class="btn btn--ghost btn--sm" id="btnSplit">分割</button>
                <button class="btn btn--ghost btn--sm" id="btnDelete">削除</button>
                <button class="btn btn--ghost btn--sm" id="btnUndo">↶ 元に戻す</button>
                <button class="btn btn--ghost btn--sm" id="btnRedo">↷ やり直し</button>
            </div>
            <div class="tl-zoom">
                <span>ズーム</span>
                <input type="range" id="zoom" min="20" max="200" value="60">
            </div>
        </div>

        <div class="timeline__body">
            <!-- トラックヘッダー -->
            <div class="track-headers" id="trackHeaders"></div>

            <!-- タイムライン本体 -->
            <div class="tracks-area" id="tracksArea">
                <div class="ruler" id="ruler"></div>
                <div class="tracks" id="tracks"></div>
                <div class="playhead" id="playhead"><div class="playhead__head"></div><div class="playhead__hit"></div></div>
            </div>
        </div>
    </section>

    <!-- ===== バージョン情報モーダル（Auriga Studio について） ===== -->
    <div class="modal" id="aboutModal" hidden>
        <div class="modal__backdrop" data-about-close></div>
        <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="aboutTitle">
            <button class="modal__close" id="aboutClose" type="button" title="閉じる" aria-label="閉じる">
                <i class="ti ti-x"></i>
            </button>
            <div class="about">
                <img class="about__mark" src="favicon-symbol.svg" alt="" width="56" height="56">
                <h2 class="about__title" id="aboutTitle">Auriga Studio</h2>
                <p class="about__tagline">統合型動画編集ソフト</p>
                <!-- バージョン詳細は version.json を読み込んで生成する -->
                <dl class="about__info" id="aboutInfo"></dl>
                <button class="btn btn--ghost btn--sm" id="aboutCopy" type="button">情報をコピー</button>
            </div>
        </div>
    </div>

    <!-- トースト通知 -->
    <div class="toast" id="toast"></div>

    <script src="main.js"></script>
</body>
</html>
